spring:
  application:
    name: strofit-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/strofit}
    username: ${DB_USERNAME:strofit}
    password: ${DB_PASSWORD:localdev}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

strofit:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-must-be-at-least-256-bits-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

logging:
  level:
    com.strofit: DEBUG
    org.springframework.security: INFO
